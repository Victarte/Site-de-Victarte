<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Premier Site sur GitHub Pages</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .carte {
            background-color: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #0056b3;
            margin-top: 0;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #555;
        }
        .bouton {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #2ea44f;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .bouton:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="carte">
        <h1>👋 Salut le monde !</h1>
        <p>Bienvenue sur ma toute première page web. Ce site est hébergé gratuitement grâce à <strong>GitHub Pages</strong>.</p>
        <p>J'ai codé et publié ça depuis mon terminal sous Linux ! 🐧🚀</p>
        
        <a href="#" class="bouton">C'est parti !</a>
    </div>

</body>
</html>
